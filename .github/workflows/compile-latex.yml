name: Compiler les fichiers LaTeX
on:
  push:
    paths:
      - '**.tex'
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Récupérer le repo
        uses: actions/checkout@v4

      - name: Compiler les fichiers LaTeX
        uses: xu-cheng/latex-action@v3
        continue-on-error: true          # ← au niveau step, pas dans with
        with:
          root_file: "**/*.tex"
          glob: true                     # ← indispensable pour le pattern
          pre_compile: |
            tlmgr update --self
            tlmgr install fourier tcolorbox pgf pgfplots bclogo chemmacros \
              tkz-base tkz-tab pstricks pst-labo qrcode numprint mdframed cancel \
              environ trimspaces collectbox

      - name: Sauvegarder les logs d'erreur
        if: always()
        run: |
          find . -name "*.log" | while read f; do
            echo "=== $f ===" >> compilation-errors.log
            grep -A 5 "^!" "$f" >> compilation-errors.log 2>/dev/null || true
          done

      - name: Uploader les logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latex-logs
          path: |
            compilation-errors.log
            **/*.log

      - name: Pousser les PDF compilés
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          find . -name "*.pdf" -exec git add {} \;   # ← find au lieu de **
          git diff --cached --quiet || git commit -m "PDF compilés automatiquement"
          git push
