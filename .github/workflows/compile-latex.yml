name: Compiler les fichiers LaTeX

on:
  push:
    paths:
      - '**.tex'
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le repo
        uses: actions/checkout@v4

      - name: Compiler les fichiers LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: "**/*.tex"
          continue_on_error: true
          pre_compile: |
            tlmgr install fouriernc tcolorbox pgf pgfplots bclogo awesomebox chemmacros tipfr tkz-base tkz-tab pstricks pst-labo qrcode numprint mdframed cancel

      - name: Sauvegarder les logs d'erreur
        if: always()
        run: |
          find . -name "*.log" | while read f; do
            echo "=== $f ===" >> compilation-errors.log
            grep -A 5 "^!" "$f" >> compilation-errors.log 2>/dev/null || true
          done

      - name: Uploader les logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latex-logs
          path: |
            compilation-errors.log
            **/*.log

      - name: Pousser les PDF compilés
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add **/*.pdf
          git diff --cached --quiet || git commit -m "PDF compilés automatiquement"
          git push
